---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: winblues7-nvidia
description: Winblues 7

base-image: ghcr.io/ublue-os/bazzite-dx-nvidia
image-version: latest

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        enable:
          - bazzite-org/bazzite 
          - bominic27644/aerothemeplasma-rpm
    install:
      packages:
      - kvantum
      - plymouth-plugin-script
      - aerothemeplasma-sounds
      - aerothemeplasma-icons
      - aerothemeplasma-desktop
      - aeroshell-workspace
      - aeroshell-smod
      - aeroshell-kwin-components
      - aeroshell-libplasma

  - type: script
    snippets:
      - 'cd $CONFIG_DIRECTORY/scripts && for script in *.sh; do [ -f "$script" ] && bash "$script" || exit $?; done'

  - type: files
    files:
      - source: system
        destination: /

  # Regenerate initramfs because of plymouth
  - type: initramfs

  - type: signing
